Name: Tapegrade
Description: Mono-input stereo cassette warble processor with wow, flutter, hiss, crackle, and tape wear morphing.
Language: C++ (RP2040 Pico SDK)
Creator: Adrian Vos
Version: "0.8.0"
Status: WIP (functional)

tags:
  - tape
  - degradation
  - stereo
  - modulation
  - lo-fi

manual: |
  Tapegrade emulates cassette-style instability and wear from subtle movement to heavily damaged textures.
  Main controls wet/dry mix, X controls tape depth and CV1 attenuation, and Y controls instability and CV2 attenuation.
  Switch positions choose clean/old/damaged tape base states, Audio In 2 morphs tape condition continuously,
  Pulse In 1 injects temporary heavy damage, and Pulse In 2 forces strong crackle while high.

panel:
  inputs:
    - id: AudioIn1
      name: Mono Audio Input
      description: Primary mono source signal for tape processing
    - id: AudioIn2
      name: Tape Condition Mod Input
      description: Audio/CV modulation that morphs between cleaner and more degraded tape states
    - id: CVIn1
      name: Tape Depth Mod
      description: Modulates wow/pitch movement amount; also routed to CV Out 1 attenuator path
    - id: CVIn2
      name: Instability Mod
      description: Modulates flutter/transport agitation; also routed to CV Out 2 attenuator path
    - id: PulseIn1
      name: Damage Burst Trigger
      description: Rising edge forces brief heavy tape degradation burst
    - id: PulseIn2
      name: Crackle Gate
      description: High gate forces stronger crackle generation
  outputs:
    - id: AudioOut1
      name: Stereo Out Left
      description: Processed cassette-style left output
    - id: AudioOut2
      name: Stereo Out Right
      description: Processed cassette-style right output
    - id: CVOut1
      name: CV1 Attenuated Out
      description: CV In 1 passthrough scaled by X knob
    - id: CVOut2
      name: CV2 Attenuated Out
      description: CV In 2 passthrough scaled by Y knob

controls:
  knobs:
    - when: { z: any }
      main:
        name: Wet/Dry Mix
        description: Blend between dry input and processed tape signal
      x:
        name: Tape Depth
        description: Increases wow and pitch instability; also sets CV Out 1 attenuation
      y:
        name: Instability
        description: Increases flutter/transport roughness; also sets CV Out 2 attenuation
  switches:
    - id: Z
      up:
        name: Clean
        description: Brighter and more stable tape response
      middle:
        name: Old
        description: Darker tone with moderate hiss and instability
      down:
        name: Damaged
        description: Strong hiss, crackle, and unstable behavior

