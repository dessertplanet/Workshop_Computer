readme: |
    Clockwork is a 6-channel polyrhythmic timing and modulation generator inspired by Pamela's Workout. It turns the Workshop Computer into a central clock, gate sequencer, and LFO generator.

    *   [Clockwork Tutorial Video](https://youtu.be/Pc0wPOAVZmw)
    *   [Clockwork Demo Video](https://www.youtube.com/watch?v=WFxAQ-dK7CM)

    ### How to control it
    *   **Toggle UP (Sound Shape)**: MAIN = Waveform, X = Level/Delay, Y = Wave Parameter. A quick flick UP (<400ms) toggles Play/Pause.
    *   **Toggle MIDDLE (Rhythm)**: MAIN = Modifier (/2048 to x128, with x1 at noon), X = Euclidean Steps (0-16), Y = Fills (steps > 0) or Phase Offset (steps = 0).
    *   **Toggle DOWN (Momentary)**: Tap to cycle pages (Outputs 1-6 & Global). Hold to edit Advanced Settings (MAIN = Loop length, X = Probability, Y = Step Offset [steps > 0] or Quantizer Scale [steps = 0]).

    ### External CV Inputs (Jacks 1-4)
    When plugged, overriding behavior occurs:
    1.  **CV Modulation (Default)**: CV modulates the Wave Parameter (Knob Y in UP mode).
    2.  **External S&H / Smooth**: Channels sample the input voltage instead of internal random noise.
    3.  **Delay Input**: Delay shape records and delays the input jack voltage.
    4.  **Math Carrier**: Math shape carrier signal switches to the input jack voltage.
    5.  **External Triggers**: Channels set to cross-channel triggers clock their loops from external gate edges.

    ### Special Speed Settings (Right of Wheel)
    *   **Cross-Channel Triggers**: Clocks loop from another channel (or physical jack if connected).
    *   **MIDI Mode**: Clocks loop from USB MIDI. Maps Outputs: S&H = 1V/Oct CV, Smooth = Velocity CV, Envelopes = Velocity-scaled decays, Gate = Gate.

    ### LED Wave Shape 3x2 Matrix Chart
    Row 1: [LED 0] [LED 1], Row 2: [LED 2] [LED 3], Row 3: [LED 4] [LED 5]
    
    **Analog Outputs (1-4)**
    *   `Gate` [○○/○○/○○] - Standard gate. Y = Duty cycle.
    *   `Ratchet` [●○/○○/○○] - Subdivided trigger. Y = Subdivisions (2-16).
    *   `Sine` [○●/○○/○○] - Bipolar LFO. Y = Phase offset (0-360°).
    *   `Triangle` [●●/○○/○○] - Bipolar LFO. Y = Skew (falling saw ↔ tri ↔ rising saw).
    *   `Saw ↑` [○○/●○/○○] - Bipolar LFO. Y = Curve (log ↔ linear ↔ exp).
    *   `Saw ↓` [●○/●○/○○] - Bipolar LFO. Y = Curve (log ↔ linear ↔ exp).
    *   `Trapezoid` [○●/●○/○○] - Bipolar LFO. Y = Peak flat sustain duration.
    *   `Hump` [●●/●○/○○] - Half-rectified sine. Y = Skew position.
    *   `Envelope` [○○/○●/○○] - Linear decay envelope. Y = Decay duration.
    *   `Log Env` [●○/○●/○○] - Exponential decay envelope. Y = Decay duration.
    *   `S&H` [○●/○●/○○] - Random Sample & Hold. Y = No effect. (calibrated 1V/Oct in MIDI mode).
    *   `Smooth` [●●/○●/○○] - Smooth Random Walk. Y = Smoothing level. (MIDI velocity in MIDI mode).
    *   `Delay` [○○/●●/○○] - CV delay processor. Y = Feedback level.
    *   `Math` [●○/●●/○○] - Cross-channel math/logic. Y = Operator (Mix, Sub, Min, Max, Multiply, AND, OR, XOR).

    **Digital Gate Outputs (5-6)**
    *   `Gate` [○○/○○/○○] - Standard gate. Y = Pulse width.
    *   `Ratchet` [●○/○○/○○] - Double trigger. Y = Trigger spacing.
    *   `Trigger` [○●/○○/○○] - Fixed 10ms trigger. Y = Phase delay.
    *   `Burst` [●●/○○/○○] - Pulses train. Y = Pulse count (1-8).
    *   `Random` [○○/●○/○○] - Random gate width. Y = Max width scale.
    *   `Utility` [●○/●○/○○] - Utility clock output. Y = Mode (1 PPQN, 4 PPQN, 24 PPQN, Run Gate).
