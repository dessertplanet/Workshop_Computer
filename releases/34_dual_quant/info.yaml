Description: Dual-output granular pitch shifter with optional chromatic quantization and pitch CV outputs.
Language: C++ (ComputerCard / Pico SDK)
Creator: Adrian Vos
Version: 1.0
Status: Beta

tags:
  - granular
  - pitch-shifter
  - dual-output
  - quantizer
  - fixed-point

manual: |
  DualQuantPitch runs two independent granular pitch-shifted outputs from one shared circular buffer.
  Main sets global pitch offset, X sets output A offset, and Y sets output B offset.
  CV In 1 and CV In 2 modulate pitch for outputs A and B respectively.
  Switch middle enables chromatic semitone quantization; other switch positions run continuously unquantized.
  The design intentionally favors gritty/lo-fi granular character over transparent pitch shifting. # certainty: medium (README is marked LLM output)

panel:
  inputs:
    - id: AudioIn1
      name: Audio Input
      description: Source audio written into the shared granular delay buffer
    - id: CVIn1
      name: Pitch Mod A
      description: Additional semitone modulation for output A
    - id: CVIn2
      name: Pitch Mod B
      description: Additional semitone modulation for output B
  outputs:
    - id: AudioOut1
      name: Pitch Shift Out A
      description: Granular pitch-shifted output A
    - id: AudioOut2
      name: Pitch Shift Out B
      description: Granular pitch-shifted output B
    - id: CVOut1
      name: Pitch CV Out A
      description: Pitch A converted to millivolt CV output # certainty: medium (not explicitly calibrated in code comments)
    - id: CVOut2
      name: Pitch CV Out B
      description: Pitch B converted to millivolt CV output # certainty: medium (not explicitly calibrated in code comments)

controls:
  knobs:
    - when: { z: up }
      main:
        name: Global Pitch Offset
        description: Shared coarse pitch shift offset for both outputs
      x:
        name: Output A Offset
        description: Additional pitch offset for output A
      y:
        name: Output B Offset
        description: Additional pitch offset for output B
    - when: { z: middle }
      main:
        name: Quantize Enable
        description: Enables chromatic semitone quantization for both outputs
  leds:
    - when: { quantized: true }
      display: list
      items:
        - id: LED0
          name: Quantized State
          description: All LEDs bright when quantization is enabled
    - when: { quantized: false }
      display: list
      items:
        - id: LED0
          name: Unquantized State
          description: All LEDs dim when quantization is disabled
