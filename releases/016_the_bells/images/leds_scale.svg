<svg width="100%" viewBox="0 0 680 460" xmlns="http://www.w3.org/2000/svg">
  <title>The Bells — scale select LED encoding</title>
  <style>
    text { font-family: sans-serif; font-size: 13px; fill: #333; }
    text.label { font-size: 15px; font-weight: 500; }
  </style>

  <text class="label" x="40" y="32">X knob — scale</text>

  <!-- S1 Major: LED 1 -->
  <circle cx="62" cy="56"  r="7" fill="#EFB9C0"/><circle cx="84" cy="56"  r="7" fill="none" stroke="#aaa" stroke-width="1.5"/>
  <circle cx="62" cy="76"  r="7" fill="none" stroke="#aaa" stroke-width="1.5"/><circle cx="84" cy="76"  r="7" fill="none" stroke="#aaa" stroke-width="1.5"/>
  <circle cx="62" cy="96"  r="7" fill="none" stroke="#aaa" stroke-width="1.5"/><circle cx="84" cy="96"  r="7" fill="none" stroke="#aaa" stroke-width="1.5"/>
  <text x="106" y="76">Major</text>

  <!-- S2 Minor: LED 2 -->
  <circle cx="62" cy="126" r="7" fill="none" stroke="#aaa" stroke-width="1.5"/><circle cx="84" cy="126" r="7" fill="#EFB9C0"/>
  <circle cx="62" cy="146" r="7" fill="none" stroke="#aaa" stroke-width="1.5"/><circle cx="84" cy="146" r="7" fill="none" stroke="#aaa" stroke-width="1.5"/>
  <circle cx="62" cy="166" r="7" fill="none" stroke="#aaa" stroke-width="1.5"/><circle cx="84" cy="166" r="7" fill="none" stroke="#aaa" stroke-width="1.5"/>
  <text x="106" y="146">Minor</text>

  <!-- S3 Pentatonic Major: LED 3 -->
  <circle cx="62" cy="196" r="7" fill="none" stroke="#aaa" stroke-width="1.5"/><circle cx="84" cy="196" r="7" fill="none" stroke="#aaa" stroke-width="1.5"/>
  <circle cx="62" cy="216" r="7" fill="#EFB9C0"/><circle cx="84" cy="216" r="7" fill="none" stroke="#aaa" stroke-width="1.5"/>
  <circle cx="62" cy="236" r="7" fill="none" stroke="#aaa" stroke-width="1.5"/><circle cx="84" cy="236" r="7" fill="none" stroke="#aaa" stroke-width="1.5"/>
  <text x="106" y="216">Pentatonic Major</text>

  <!-- S4 Pentatonic Minor: LED 4 -->
  <circle cx="62" cy="266" r="7" fill="none" stroke="#aaa" stroke-width="1.5"/><circle cx="84" cy="266" r="7" fill="none" stroke="#aaa" stroke-width="1.5"/>
  <circle cx="62" cy="286" r="7" fill="none" stroke="#aaa" stroke-width="1.5"/><circle cx="84" cy="286" r="7" fill="#EFB9C0"/>
  <circle cx="62" cy="306" r="7" fill="none" stroke="#aaa" stroke-width="1.5"/><circle cx="84" cy="306" r="7" fill="none" stroke="#aaa" stroke-width="1.5"/>
  <text x="106" y="286">Pentatonic Minor</text>

  <!-- S5 Blues: LED 5 -->
  <circle cx="62" cy="336" r="7" fill="none" stroke="#aaa" stroke-width="1.5"/><circle cx="84" cy="336" r="7" fill="none" stroke="#aaa" stroke-width="1.5"/>
  <circle cx="62" cy="356" r="7" fill="none" stroke="#aaa" stroke-width="1.5"/><circle cx="84" cy="356" r="7" fill="none" stroke="#aaa" stroke-width="1.5"/>
  <circle cx="62" cy="376" r="7" fill="#EFB9C0"/><circle cx="84" cy="376" r="7" fill="none" stroke="#aaa" stroke-width="1.5"/>
  <text x="106" y="356">Blues</text>

  <!-- S6 Chromatic: LED 6 -->
  <circle cx="62" cy="406" r="7" fill="none" stroke="#aaa" stroke-width="1.5"/><circle cx="84" cy="406" r="7" fill="none" stroke="#aaa" stroke-width="1.5"/>
  <circle cx="62" cy="426" r="7" fill="none" stroke="#aaa" stroke-width="1.5"/><circle cx="84" cy="426" r="7" fill="none" stroke="#aaa" stroke-width="1.5"/>
  <circle cx="62" cy="446" r="7" fill="none" stroke="#aaa" stroke-width="1.5"/><circle cx="84" cy="446" r="7" fill="#EFB9C0"/>
  <text x="106" y="426">Chromatic</text>

</svg>
