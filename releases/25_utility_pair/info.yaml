draft: true
Name: Utility Pair
short-description: 25 small utilities, which can be combined in pairs
Language: C++ (ComputerCard)
Creator: Chris Johnson
Version: 1.0
Status: Released
License: MIT
date: 2025-01-21
Repository: https://github.com/chrisgjohnson/Utility-Pair

tags:
  - utility
  - multi-tool
  - modulation
  - effects

summary: |
  Utility Pair splits the card into independent left and right utility engines.
  Each side owns one knob/control and one column of input/output jacks, letting two utilities run at once.
  In the 2025 multi-pack firmware, hold Z down at power/reset to enter utility selection mode, then choose left and right utilities and start.
  Specific jack behavior depends on the chosen utility pair.

# certainty: low — exact jack behavior is pair-dependent and selected utility-specific
panel:
  inputs:
    - id: AudioIn1
      name: Left Utility Signal Input
      description: Left-side input routed according to selected left utility
    - id: CVIn1
      name: Left Utility CV Input
      description: Left-side CV input routed according to selected left utility
    - id: PulseIn1
      name: Left Utility Trigger Input
      description: Left-side pulse input routed according to selected left utility
    - id: AudioIn2
      name: Right Utility Signal Input
      description: Right-side input routed according to selected right utility
    - id: CVIn2
      name: Right Utility CV Input
      description: Right-side CV input routed according to selected right utility
    - id: PulseIn2
      name: Right Utility Trigger Input
      description: Right-side pulse input routed according to selected right utility
  outputs:
    - id: AudioOut1
      name: Left Utility Signal Output
      description: Left-side output generated by selected left utility
    - id: CVOut1
      name: Left Utility CV Output
      description: Left-side CV output generated by selected left utility
    - id: PulseOut1
      name: Left Utility Pulse Output
      description: Left-side pulse output generated by selected left utility
    - id: AudioOut2
      name: Right Utility Signal Output
      description: Right-side output generated by selected right utility
    - id: CVOut2
      name: Right Utility CV Output
      description: Right-side CV output generated by selected right utility
    - id: PulseOut2
      name: Right Utility Pulse Output
      description: Right-side pulse output generated by selected right utility

controls:
  knobs:
    - when: { z: middle }
      main:
        name: Left Utility Secondary Control
        description: Main knob is generally owned by left utility
      x:
        name: Left Utility Primary Control
        description: X knob is generally owned by left utility
      y:
        name: Right Utility Primary Control
        description: Y knob is generally owned by right utility
    - when: { z: any }
      main:
        name: Utility Selector (multi-pack firmware)
        description: At boot-select mode, Main chooses left or right utility slot to edit
      x:
        name: Left Utility Select
        description: In selector mode, chooses the left utility
      y:
        name: Right Utility Select
        description: In selector mode, chooses the right utility
    - when: { z: up }
      main:
        name: Run Selected Pair
        description: In selector mode, move Z up to start selected utility pair
    - when: { z: down, gesture: hold }
      main:
        name: Enter Selector Mode
        description: Hold Z down on boot/reset to choose utility pair in multi-pack firmware
