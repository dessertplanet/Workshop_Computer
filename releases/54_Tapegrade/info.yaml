documentation:
  intro: >
    Tapegrade emulates cassette-style instability and wear from subtle movement to
    heavily damaged textures.

    Main controls wet/dry mix, X controls tape depth and CV1 attenuation, and Y controls
    instability and CV2 attenuation.

    Switch positions choose clean/old/damaged tape base states, Audio In 2 morphs tape
    condition continuously, Pulse In 1 injects temporary heavy damage, and Pulse In 2
    forces strong crackle while high.
