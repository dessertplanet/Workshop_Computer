id: BitPhase
title: BitPhase
draft: false
release: 59 / 0.1.0
summary: Resonant 4-stage phaser with wide modulation sweeps, tremolo blending, and Burst-mode degradation
short-description: Resonant 4-stage phaser for the Workshop Computer with deep notch filtering, wide modulation sweeps, controllable resonance, tremolo blending, and digital Burst-mode degradation.
date: 2026-06-24

panel:
  controls:
    main:
      label: Rate
      description: Speed of the internal phaser and tremolo LFOs
      source: info.yaml
    x:
      label: Sweep Depth
      description: Phaser modulation depth from narrow movement to wide sweeping notches
      source: info.yaml
    y:
      label: Resonance
      description: Phaser feedback amount from smooth phasing to edge-of-self-oscillation
      source: info.yaml
    z:
      label: Mode
      description: Up is pure phaser, middle blends phaser with tremolo, and down enables Burst degradation.
      source: info.yaml
  inputs:
    audio_l:
      label: Main Audio Input
      description: Main audio input for the phaser engine
      source: info.yaml
    audio_r:
      label: Secondary Audio Input
      description: Secondary audio input if used by firmware or patch
      source: info.yaml
    cv_1:
      label: Rate CV
      description: Modulates phaser and tremolo speed
      source: info.yaml
    cv_2:
      label: Resonance CV
      description: Modulates phaser feedback amount
      source: info.yaml
    pulse_1:
      label: LFO Reset
      description: Resets phaser LFO so sweep can be clock-synchronised
      source: info.yaml
  outputs:
    audio_out_1:
      label: Processed Output A
      description: Dual mono output of processed signal
      source: info.yaml
    audio_out_2:
      label: Processed Output B
      description: Dual mono output of processed signal
      source: info.yaml
    cv_out_1:
      label: Phaser LFO CV
      description: Phaser LFO waveform output
      source: info.yaml
    cv_out_2:
      label: Tremolo LFO CV
      description: Tremolo LFO waveform output
      source: info.yaml
    pulse_out_1:
      label: Burst Active
      description: High while Burst mode is active
      source: info.yaml
    pulse_out_2:
      label: Phaser LFO Phase
      description: Phaser LFO phase indicator for synchronising external events
      source: info.yaml

switch_modes:
  up: Pure resonant 4-stage all-pass phaser with the cleanest signal path.
  middle: Blends phasing with tremolo for animated pulsing movement.
  down: Adds sample-and-hold reduction, bit-depth reduction, and unstable lo-fi texture.

leds:
  - "LED 1 follows the rate position."
  - "LED 2 follows the phaser LFO position."
  - "LED 3 follows sweep position."
  - "LED 4 follows Burst intensity."
  - "LED 5 indicates Burst mode status."
  - "LED 6 monitors Pulse In 1."

