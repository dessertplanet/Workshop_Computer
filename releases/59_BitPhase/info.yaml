documentation:
  intro: >
    BitPhase combines a resonant 4-stage all-pass phaser, independent phaser and
    tremolo LFOs, CV control of rate and resonance, and a Burst-mode digital
    degradation path.

    Main controls LFO rate, X controls phaser sweep depth, and Y controls resonance/
    feedback. Switch up is pure phaser, middle blends phaser with tremolo, and down
    enables Burst degradation. Pulse In 1 resets the phaser LFO for clock-synchronised
    sweeps.
