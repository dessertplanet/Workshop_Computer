draft: true
Name: Fr330hfr33
Description: Hardware-tested acid bass synthesiser with saw or square oscillator, diode-style filtering, accent, glide, distortion, USB MIDI, and a persistent editable sequencer.
Language: C++ (Pico SDK)
Creator: Adrian Vos
Version: 0.9.1
Status: Stable
Editor: web_config
web-entry: Fr330hfr33.html

tags:
  - synth
  - midi
  - web-midi
  - sequencer
  - acid

manual: |
  Acid bass voice with selectable saw/square oscillator, 18 or 24 dB diode-style filter, accent,
  glide, distortion, USB MIDI device/host operation, and persistent editable sequencer.
  Main controls filter cutoff, X controls resonance, and Y couples envelope decay with glide time.
  Switch up is external CV/gate or USB MIDI mode; middle is generative sequencer mode;
  momentary down simulates battery pull.
  Web MIDI editor configures scale, root, accent probability, pattern lanes, and internal tempo.

panel:
  inputs:
    - id: CVIn1
      name: Pitch CV
      description: 1V/oct pitch input in switch-up CV/gate mode
    - id: PulseIn1
      name: Gate In
      description: External gate input in switch-up CV/gate mode
    - id: PulseIn2
      name: Clock / Slide
      description: External sequencer clock in switch-middle mode; manual glide enable in CV/MIDI mode
  outputs:
    - id: AudioOut1
      name: Filtered Voice
      description: Enveloped post-filter acid bass voice
    - id: AudioOut2
      name: Raw Oscillator
      description: Phase-aligned raw selected oscillator for blending with filtered voice
    - id: CVOut1
      name: Pitch Out
      description: Calibrated 1V/oct output following currently played pitch
    - id: PulseOut1
      name: Gate Out
      description: Gate output following external, MIDI, or sequencer notes

controls:
  knobs:
    - when: { z: up }
      main:
        name: Cutoff
        description: Diode-style ladder filter resting cutoff
      x:
        name: Resonance
        description: Filter resonance from body to self-oscillation
      y:
        name: Decay / Glide
        description: Couples envelope decay and pitch glide time
    - when: { z: middle }
      main:
        name: Cutoff
        description: Filter cutoff in sequencer mode
      x:
        name: Resonance
        description: Filter resonance in sequencer mode
      y:
        name: Decay / Glide
        description: Envelope decay and glide in sequencer mode
  switches:
    - id: Z
      up:
        name: CV / MIDI Mode
        description: External CV/gate or USB MIDI monophonic control
      middle:
        name: Sequencer Mode
        description: History-aware generative sequencer with optional external/MIDI clock
      down:
        name: Battery Pull
        description: Momentary battery-pull collapse gesture

  leds:
    - when: { z: any }
      display: list
      items:
        - id: LED0
          name: CV/MIDI Mode Indicator
          description: Lit in switch-up CV/MIDI mode
        - id: LED1
          name: Gate Follow
          description: Follows current gate with dim idle level
        - id: LED2
          name: Sequencer Mode Indicator
          description: Lit in switch-middle sequencer mode; pulses for active pattern slot
        - id: LED3
          name: Accent Indicator
          description: Indicates accented notes
        - id: LED4
          name: Battery Pull Indicator
          description: Lit in switch-down battery-pull mode
        - id: LED5
          name: Note Brightness / Filter Mode
          description: Displays note brightness; fully lit in 18 dB three-pole mode

host:
  usb:
    - name: Fr330hfr33 Web MIDI Editor
      role: editor
      description: Open web_config/Fr330hfr33.html in Chrome or Edge to configure scale, patterns, and tempo
  notes: |
    Four checksummed card-flash pattern slots and general editor settings persist across power cycles.
    USB MIDI automatically operates as device or host according to Workshop Computer USB power role.
