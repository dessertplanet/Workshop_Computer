Name: LoCho Vibes
Description: Stereo lo-fi chorus and vibrato effect for the Workshop Computer.
Language: C++
Creator: Adrian Vos
Version: 0.1.0
Status: released

manual: |
  Stereo lo-fi chorus/vibrato with clockable LFO and character shaping.
  Main controls modulation rate, X controls modulation depth, Y controls Character
  (lo-fi degradation <-> compression coloration). Switch up selects vibrato mode
  (fully wet), middle selects chorus mode (dry/wet blend), and a momentary move
  to down cycles LFO shape (triangle, sine, random drift).

panel:
  inputs:
    - id: AudioIn1
      name: Audio Input Left
      description: Left input channel; summed with AudioIn2 to mono before stereo modulation processing
    - id: AudioIn2
      name: Audio Input Right
      description: Right input channel; summed with AudioIn1 to mono before stereo modulation processing
    - id: CVIn1
      name: Depth Modulation
      description: Bipolar CV modulation for X depth control
    - id: CVIn2
      name: Character Modulation
      description: Bipolar CV modulation for Y Character control
    - id: PulseIn1
      name: External LFO Clock
      description: Rising edges sync LFO timing to external pulse source with internal fallback when pulses stop
  outputs:
    - id: AudioOut1
      name: Audio Output Left
      description: Left processed output
    - id: AudioOut2
      name: Audio Output Right
      description: Right processed output
    - id: CVOut1
      name: LFO CV
      description: Main internal LFO waveform as CV
    - id: CVOut2
      name: Inverted LFO CV
      description: Inverted version of the internal LFO waveform

controls:
  knobs:
    - when: { z: middle }
      main:
        name: Modulation Rate
        description: LFO speed for chorus/vibrato movement
      x:
        name: Modulation Depth
        description: LFO pitch/modulation depth amount
      y:
        name: Character
        description: Bipolar character shaping from lo-fi degradation to compression/saturation coloration
    - when: { z: up }
      main:
        name: Modulation Rate
        description: Same rate control, applied in vibrato mode
      x:
        name: Modulation Depth
        description: Same depth control, applied in vibrato mode
      y:
        name: Character
        description: Same character control, applied in vibrato mode
    - when: { z: down, gesture: momentary }
      main:
        name: LFO Shape Select
        description: Momentary down action advances waveform triangle -> sine -> random drift

  leds:
    - when: { z: down, gesture: momentary }
      display: list
      items:
        - id: LED0
          name: Shape Overlay Triangle A
          description: Lit with LED1 when triangle shape is selected
        - id: LED1
          name: Shape Overlay Triangle B
          description: Lit with LED0 when triangle shape is selected
        - id: LED2
          name: Shape Overlay Sine A
          description: Lit with LED3 when sine shape is selected
        - id: LED3
          name: Shape Overlay Sine B
          description: Lit with LED2 when sine shape is selected
        - id: LED4
          name: Shape Overlay Random A
          description: Lit with LED5 when random drift shape is selected
        - id: LED5
          name: Shape Overlay Random B
          description: Lit with LED4 when random drift shape is selected
    - when: { z: middle }
      display: list
      items:
        - id: LED0
          name: Rate
          description: Brightness reflects modulation rate
        - id: LED1
          name: Depth
          description: Brightness reflects modulation depth
        - id: LED2
          name: Lo-Fi Amount
          description: Brightness increases as Character moves counter-clockwise
        - id: LED3
          name: Compression Amount
          description: Brightness increases as Character moves clockwise
        - id: LED4
          name: LFO Phase
          description: Visualizes main LFO phase
        - id: LED5
          name: Inverted LFO Phase
          description: Visualizes inverted LFO phase
    - when: { z: up }
      display: list
      items:
        - id: LED0
          name: Rate
          description: Brightness reflects modulation rate
        - id: LED1
          name: Depth
          description: Brightness reflects modulation depth
        - id: LED2
          name: Lo-Fi Amount
          description: Brightness increases as Character moves counter-clockwise
        - id: LED3
          name: Compression Amount
          description: Brightness increases as Character moves clockwise
        - id: LED4
          name: LFO Phase
          description: Visualizes main LFO phase
        - id: LED5
          name: Inverted LFO Phase
          description: Visualizes inverted LFO phase
