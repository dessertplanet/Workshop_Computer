id: 58_LoChoVibes
title: LoCho Vibes
draft: false
release: 58 / 0.1.0
date: 2026-06-14
summary: >-
  Stereo chorus and vibrato effect featuring triangle, sine, and slow drift LFO modes,
  modulation-based delay movement, and tape-style saturation.
short-description: >-
  Stereo chorus and vibrato effect featuring triangle, sine, and slow drift LFO modes,
  modulation-based delay movement, and tape-style saturation.
panel:
  controls:
    main:
      label: Mod Rate
      description: LFO speed for chorus/vibrato movement
      source: info.yaml
    x:
      label: Mod Depth
      description: LFO pitch/modulation depth amount
      source: info.yaml
    'y':
      label: Character
      description: >-
        Bipolar character shaping from lo-fi degradation to compression/saturation
        coloration
      source: info.yaml
    z:
      label: |-
        LFO Shape
        Select
      description: Momentary down action advances waveform triangle -> sine -> random drift
      source: info.yaml
  inputs:
    audio_l:
      label: |-
        Audio In
        Left
      description: >-
        Left input channel; summed with AudioIn2 to mono before stereo modulation
        processing
      source: info.yaml
    audio_r:
      label: |-
        Audio In
        Right
      description: >-
        Right input channel; summed with AudioIn1 to mono before stereo modulation
        processing
      source: info.yaml
    cv_1:
      label: Depth Mod
      description: Bipolar CV modulation for X depth control
      source: info.yaml
    cv_2:
      label: |-
        Character
        Mod
      description: Bipolar CV modulation for Y Character control
      source: info.yaml
    pulse_1:
      label: |-
        Ext LFO
        Clock
      description: >-
        Rising edges sync LFO timing to external pulse source with internal fallback
        when pulses stop
      source: info.yaml
  outputs:
    audio_out_l:
      label: |-
        Audio Out
        Left
      description: Left processed output
      source: info.yaml
    audio_out_r:
      label: |-
        Audio Out
        Right
      description: Right processed output
      source: info.yaml
    cv_out_1:
      label: LFO CV
      description: Main internal LFO waveform as CV
      source: info.yaml
    cv_out_2:
      label: |-
        Inverted LFO
        CV
      description: Inverted version of the internal LFO waveform
      source: info.yaml
switch_modes:
  up: 'Z up: MAIN: Modulation Rate; X: Modulation Depth; Y: Character.'
  middle: 'Z middle: MAIN: Modulation Rate; X: Modulation Depth; Y: Character.'
  down: 'Z down, momentary: MAIN: LFO Shape Select.'
leds:
  - "LED 1 follows clock / rate indication."
  - "LED 2 follows modulation activity and depth."
  - "LED 3 follows lo-fi amount."
  - "LED 4 follows compression amount."
  - "LED 5 follows shape animation A."
  - "LED 6 follows shape animation B."
  - "When the switch is tapped down, LEDs 1-2 show triangle, LEDs 3-4 show sine, and LEDs 5-6 show random drift."
  
