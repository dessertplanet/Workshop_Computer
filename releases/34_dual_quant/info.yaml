documentation:
  intro: >
    DualQuantPitch runs two independent granular pitch-shifted outputs from one shared
    circular buffer.

    Main sets global pitch offset, X sets output A offset, and Y sets output B offset.

    CV In 1 and CV In 2 modulate pitch for outputs A and B respectively.

    Switch middle enables chromatic semitone quantization; other switch positions run
    continuously unquantized.

    The design intentionally favors gritty/lo-fi granular character over transparent
    pitch shifting. # certainty: medium (README is marked LLM output)
