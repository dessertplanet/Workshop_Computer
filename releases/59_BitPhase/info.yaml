draft: true
Name: BitPhase
Description: Resonant 4-stage phaser for the Workshop Computer with deep notch filtering, wide modulation sweeps, controllable resonance, tremolo blending, and digital Burst-mode degradation.
Language: C++ (Pico SDK)
Creator: Adrian Vos
Version: 0.1.0
Status: Beta
License: MIT

tags:
  - effect
  - phaser
  - tremolo
  - lo-fi

manual: |
  BitPhase combines a resonant 4-stage all-pass phaser, independent phaser and tremolo LFOs,
  CV control of rate and resonance, and a Burst-mode digital degradation path.
  Main controls LFO rate, X controls phaser sweep depth, and Y controls resonance/feedback.
  Switch up is pure phaser, middle blends phaser with tremolo, and down enables Burst degradation.
  Pulse In 1 resets the phaser LFO for clock-synchronised sweeps.

panel:
  inputs:
    - id: AudioIn1
      name: Main Audio Input
      description: Main audio input for the phaser engine
    - id: AudioIn2
      name: Secondary Audio Input
      description: Secondary audio input if used by firmware or patch
    - id: CVIn1
      name: Rate CV
      description: Modulates phaser and tremolo speed
    - id: CVIn2
      name: Resonance CV
      description: Modulates phaser feedback amount
    - id: PulseIn1
      name: LFO Reset
      description: Resets phaser LFO so sweep can be clock-synchronised
  outputs:
    - id: AudioOut1
      name: Processed Output A
      description: Dual mono output of processed signal
    - id: AudioOut2
      name: Processed Output B
      description: Dual mono output of processed signal
    - id: CVOut1
      name: Phaser LFO CV
      description: Phaser LFO waveform output
    - id: CVOut2
      name: Tremolo LFO CV
      description: Tremolo LFO waveform output
    - id: PulseOut1
      name: Burst Active
      description: High while Burst mode is active
    - id: PulseOut2
      name: Phaser LFO Phase
      description: Phaser LFO phase indicator for synchronising external events

controls:
  knobs:
    - when: { z: up }
      main:
        name: Rate
        description: Speed of internal phaser and tremolo LFOs
      x:
        name: Sweep Depth
        description: Phaser modulation depth from narrow movement to wide sweeping notches
      y:
        name: Resonance
        description: Phaser feedback amount from smooth phasing to edge-of-self-oscillation
    - when: { z: middle }
      main:
        name: Rate
        description: Speed of internal phaser and tremolo LFOs
      x:
        name: Sweep Depth
        description: Phaser modulation depth
      y:
        name: Resonance
        description: Phaser feedback amount
    - when: { z: down }
      main:
        name: Rate
        description: Speed of internal phaser and tremolo LFOs in Burst mode
      x:
        name: Sweep Depth
        description: Phaser modulation depth in Burst mode
      y:
        name: Resonance
        description: Phaser feedback amount in Burst mode
  switches:
    - id: Z
      up:
        name: Phaser
        description: Pure resonant 4-stage all-pass phaser with cleanest signal path
      middle:
        name: Mix
        description: Blends phasing with tremolo for animated pulsing movement
      down:
        name: Burst
        description: Adds sample-and-hold reduction, bit-depth reduction, and unstable lo-fi texture
  leds:
    - when: { z: any }
      display: list
      items:
        - id: LED0
          name: Rate Position
        - id: LED1
          name: Phaser LFO Position
        - id: LED2
          name: Sweep Position
        - id: LED3
          name: Burst Intensity
        - id: LED4
          name: Burst Mode Status
        - id: LED5
          name: Pulse Input Monitor
