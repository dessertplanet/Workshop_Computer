draft: false
Name: Goldfish
Description: Weird delay/looper for audio and CV
Language: Pico SDK
Creator: Dune Desormeaux
Version: 1.0
Status: Ready
demo-link: https://youtu.be/pdzMC6afrHY

tags:
  - delay
  - looper
  - cv
  - glitch

manual: |
  Goldfish is a multi-mode delay/looper with synchronized pulse/CV outputs. Switch selects record,
  delay, and play behaviors; Pulse inputs provide clock/reset; and CV/audio inputs modulate delay time,
  playback position, and generated CV/pitch material.

panel:
  inputs:
    - id: AudioIn1
      name: Audio Input
      description: Primary audio input for delay/record/play processing
    - id: AudioIn2
      name: Mod Main
      description: Modulates Main control behavior in multiple modes
    - id: CVIn1
      name: X Mod
      description: Modulates X-dependent CV mix and playback position
    - id: CVIn2
      name: Y Mod
      description: Modulates Y-dependent CV mix and playback position
    - id: PulseIn1
      name: Sample Trig / clock
      description: Advances divider, triggers S&H
    - id: PulseIn2
      name: Reset Trigger
      description: Requests playback/reset actions on rising edge
  outputs:
    - id: AudioOut1
      name: Left Audio Output
      description: Main processed audio channel
    - id: AudioOut2
      name: Right Audio Output
      description: Secondary processed audio channel
    - id: CVOut1
      name: CV Mix Output
      description: Mixed output derived from X/Y/CV inputs
    - id: CVOut2
      name: Quantized CV Output
      description: CV material quantized to a major scale
    - id: PulseOut1
      name: Internal Clock Output
      description: Timed pulse output tied to clock/divider events
    - id: PulseOut2
      name: Clock Divider Output
      description: Secondary timed pulse output tied to divider events

controls:
  switch:
    up:
      name: Delay
      description: Enter delay behavior
    middle:
      name: Play
      description: Enter loop playback behavior
    down:
      name: Record
      description: Enter record behavior (clears the loop and records fresh)
  knobs:
    - when: { z: any }
      main:
        name: Time / CV Xfade
        description: Mode-dependent delay/playback macro, modulated by AudioIn2 when connected
      x:
        name: Int Clock Rate
        description: Sets the internal clock rate; also attenuverts CV mix input 1 and maps playback position
      y:
        name: Clock Div
        description: Sets the clock divider amount; also attenuverts CV mix input 2 and maps playback position
