  creator: Adrian Vos with Vibecode support
  language: C++
  version: 1
  status: Beta. USB MIDI clock input and sequencer note output tested
  license: GPL-3.0
documentation:
  intro: >
    Generative rhythm/melody organism with coupled trigger streams, quantized melody CV,

    internal kick/snare voices, evolving energy/tension modulation, and USB MIDI clock/note

    behavior. Main controls internal tempo when no external clock is present, X controls

    rhythmic density, and Y controls mutation amount. The switch selects Steady, Drift, or

    Surge behavior, moving from restrained patterns to more animated swing, mutation, and

    melodic activity. Pulse In 1 is external clock and Pulse In 2 freezes mutation while
    high.
