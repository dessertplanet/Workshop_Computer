id: Tapegrade
title: Tapegrade
draft: false
release: 54 / 0.8.0
date: 2026-06-14
summary: >-
  Mono-input stereo cassette warble processor with wow, flutter, hiss, crackle, and tape
  wear morphing.
short-description: >-
  Mono-input stereo cassette warble processor with wow, flutter, hiss, crackle, and tape
  wear morphing.

panel:
  controls:
    main:
      label: |-
        Wet / Dry
        Mix
      description: Blend between dry input and processed tape signal
      source: info.yaml
    x:
      label: Tape Depth
      description: Increases wow and pitch instability; also sets CV Out 1 attenuation
      source: info.yaml
    y:
      label: Instability
      description: Increases flutter/transport roughness; also sets CV Out 2 attenuation
      source: info.yaml
    z:
      label: Mode
      description: Selects clean, old, or damaged tape behaviour.
      source: info.yaml
  inputs:
    audio_l:
      label: |-
        Mono Audio
        In
      description: Primary mono source signal for tape processing
      source: info.yaml
    audio_r:
      label: |-
        Tape
        Condition
      description: Audio/CV modulation that morphs between cleaner and more degraded tape states
      source: info.yaml
    cv_1:
      label: |-
        Tape Depth
        Mod
      description: Modulates wow/pitch movement amount; also routed to CV Out 1 attenuator path
      source: info.yaml
    cv_2:
      label: |-
        Instability
        Mod
      description: Modulates flutter/transport agitation; also routed to CV Out 2 attenuator path
      source: info.yaml
    pulse_1:
      label: |-
        Damage Burst
        Trig
      description: Rising edge forces brief heavy tape degradation burst
      source: info.yaml
    pulse_2:
      label: Crackle Gate
      description: High gate forces stronger crackle generation
      source: info.yaml
  outputs:
    audio_out_l:
      label: |-
        Stereo Out
        Left
      description: Processed cassette-style left output
      source: info.yaml
    audio_out_r:
      label: |-
        Stereo Out
        Right
      description: Processed cassette-style right output
      source: info.yaml
    cv_out_1:
      label: |-
        CV1
        Attenuated
      description: CV In 1 passthrough scaled by X knob
      source: info.yaml
    cv_out_2:
      label: |-
        CV2
        Attenuated
      description: CV In 2 passthrough scaled by Y knob
      source: info.yaml

switch_modes:
  up: Brighter and more stable tape response.
  middle: Darker tone with moderate hiss and instability.
  down: Strong hiss, crackle, and unstable behavior.

leds:
  - "LED 1 follows modulated left delay movement."
  - "LED 2 follows instability."
  - "LED 3 follows modulated right delay movement."
  - "LED 4 follows wet/dry mix."
  - "LED 5 follows tape condition and damage state."

