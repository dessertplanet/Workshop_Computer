manual: |
  Chaotic Benjolin-inspired program combining rungler-style modulation, quantized CV, and pulse generation.
  Forward/back clocks can be driven from Pulse In 1 and Pulse In 2.
  The card blends internal randomness with external modulation for probability, offset, and amplitude.

  The Z switch sets how shift-register cells are written on each clock:
    - Up (Double Length): toggles the write cell each clock, producing a stable loop of double length.
    - Middle (Unlock): writes from the data input (or internal noise) when data exceeds the Chaos threshold.
    - Down (Write): forces the write cell to a fixed value.
  The Chaos, Offset, and Chaos VCA knobs behave the same in all switch positions.

panel:
  inputs:
    - id: PulseIn1
      name: FWD Clk In
      description: Rising edge advances the shift register in the forward direction
      type: pulse
    - id: PulseIn2
      name: Back Clk In
      description: Rising edge advances the shift register in the reverse direction
      type: pulse
    - id: AudioIn1
      name: Data Input
      description: External data source for shift-register writes in Unlock (middle) switch mode; normalled to internal noise
      type: audio
    - id: AudioIn2
      name: Lock CV
      description: Modulates the Chaos/Lock probability alongside the Chaos knob
      type: cv
    - id: CVIn1
      name: Offset CV
      description: Modulates the Offset amount used in rungler processing
      type: cv
    - id: CVIn2
      name: VCA CV
      description: Modulates the Chaos VCA depth for output scaling
      type: cv
  outputs:
    - id: AudioOut1
      name: Raw Out 1
      description: Audio-rate rungler output channel 1
      type: audio
    - id: AudioOut2
      name: Raw Out 2
      description: Audio-rate rungler output channel 2
      type: audio
    - id: CVOut1
      name: Quant Out 1
      description: Quantized MIDI-note CV derived from channel 1 rungler state
      type: cv
    - id: CVOut2
      name: Quant Out 2
      description: Quantized MIDI-note CV derived from channel 2 rungler state
      type: cv
    - id: PulseOut1
      name: 1-Bit Out 1
      description: Single-bit pulse output from the shift-register state (channel 1)
      type: pulse
    - id: PulseOut2
      name: 1-Bit Out 2
      description: Single-bit pulse output from the shift-register state (channel 2)
      type: pulse

controls:
  switch:
    up:
      name: Double Length
      description: Toggles the write cell each clock, producing a stable loop of double length
    middle:
      name: Unlock
      description: Writes from the data input (or internal noise) when data exceeds the Chaos threshold
    down:
      name: Write
      description: Forces the write cell to a fixed value
  knobs:
    - when: { z: any }
      main:
        name: Chaos
        description: Lock (stable loop) through Chaos (random) probability that shift-register cells change
      x:
        name: Offset
        description: Sets output offset amount (or depth for Offset CV / CV In 1 modulation)
      y:
        name: Chaos VCA
        description: Scales rungler output amplitude (or depth for VCA CV / CV In 2 modulation)