Name: 433 Sense of Space - Seat Creak Development
Description: "Development variant with 2 MB and 16 MB builds, a three-loop 4'33\" transport, LED countdown, and Switch Down musician-shifts-in-seat chair creak one-shot."
Language: C++ (Pico SDK / ComputerCard)
Creator: Music Thing Modular / AI-assisted
Version: 0.1.0-seat-creak-dev
Status: development
License: Mixed - source code/reverb components follow their original project licences; embedded BBC Sound Effects audio is subject to BBC Sound Effects Archive licensing
license-notes: Embedded BBC Sound Effects Archive audio is for non-commercial, personal or research purposes unless separately licensed from the BBC.

tags:
  - ambience
  - reverb
  - sampler
  - experimental
  - foley

summary: |
  Development variant of 433 Sense of Space, supplied as 2 MB and 16 MB builds.
  Switch Up stops and arms the performance, Switch Middle starts three 91 second
  loops sourced from 1:30-3:01 of the BBC recording, and the left column LEDs count
  down from three loops to zero. Switch Down triggers a short chair/stool creak
  one-shot representing the musician shifting in their seat.

panel:
  outputs:
    - id: AudioOut1
      name: Left
      type: audio
      description: Left stereo output
    - id: AudioOut2
      name: Right
      type: audio
      description: Right stereo output

controls:
  knobs:
    - when: { z: any }
      main:
        name: Reserved
        description: Reserved for future variations
      x:
        name: Space
        description: Reverb character, from small room to cathedral
      y:
        name: Amount
        description: Dry/wet reverb amount
    - when: { z: down, gesture: momentary }
      main:
        name: Seat Creak
        description: Trigger a short chair/stool creak one-shot
    - when: { z: up }
      main:
        name: Stop / Arm
        description: Stop playback, reset to the beginning, and light all three countdown LEDs
    - when: { z: middle }
      main:
        name: Start
        description: Start a three-loop 4'33" performance from the beginning
  leds:
    - when: { z: any }
      display: list
      items:
        - id: LED0
          name: Loop 1 remaining
        - id: LED2
          name: Loop 2 remaining
        - id: LED4
          name: Loop 3 remaining
        - id: LED1
          name: Running indicator
        - id: LED3
          name: Running indicator
        - id: LED5
          name: Running indicator
