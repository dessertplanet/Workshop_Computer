documentation:
  intro: >
    Dual-layer Turing-style random sequencer with a switchable mixer layer and tap tempo or external
    clocking.

    The beta card builds on ideas and code from Tom Whitwell and Chris Johnson, with the Workshop
    Computer port adapting those concepts into a two-layer panel workflow.

    Pulse In 1 overrides tap tempo as the main clock; Pulse In 2 can clock channel 2 independently.

    CV In 1 controls divide/multiply on channel 2 in middle mode and mix input 1 in up mode. CV In 2
    applies quantized pitch offset in middle mode and mix input 2 in up mode.

    Audio In 1 and Audio In 2 pass through in middle mode and become the mixer inputs in up mode.
